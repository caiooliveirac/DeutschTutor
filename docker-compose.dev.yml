services:
  postgres:
    image: postgres:16-alpine
    container_name: deutschtutor-dev-db
    environment:
      POSTGRES_DB: deutschtutor
      POSTGRES_USER: deutschtutor
      POSTGRES_PASSWORD: deutschtutor
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deutschtutor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deutschtutor-dev-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: deutschtutor-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_next:/app/.next
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://deutschtutor:deutschtutor@postgres:5432/deutschtutor
      - REDIS_URL=redis://redis:6379
      - WATCHPACK_POLLING=true
    restart: unless-stopped

volumes:
  dev_pgdata:
  dev_node_modules:
  dev_next:
