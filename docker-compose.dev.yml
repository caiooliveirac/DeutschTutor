# docker-compose.dev.yml — Validação local de build de produção
#
# NÃO use para desenvolvimento ativo — use `pnpm dev` para hot reload.
# Use isto apenas para validar que o build Docker funciona antes de push.
#
# Uso:
#   docker compose -f docker-compose.dev.yml build   # Só validar build
#   docker compose -f docker-compose.dev.yml up -d    # Testar app em prod mode
#   docker compose -f docker-compose.dev.yml down      # Parar
#
# Acesso: http://localhost:3000

services:
  deutschtutor-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ""  # Sem basePath no dev local
    container_name: deutschtutor-dev
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_USERS=${AUTH_USERS}
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"
    restart: "no"
