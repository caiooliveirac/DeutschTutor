# ── Dev Container — hot reload persistente ──
#
# Suba UMA VEZ. Depois disso, apenas edite código → hot reload automático.
# O agente nunca precisa rodar docker compose novamente para mudanças de código.
#
# Primeiro uso (ou quando deps mudarem):
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Logs:   docker compose -f docker-compose.dev.yml logs -f
# Parar:  docker compose -f docker-compose.dev.yml down
# Reset:  docker compose -f docker-compose.dev.yml down -v  (apaga node_modules do container)
#
# Acesso: http://localhost:3001

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: deutschtutor-dev
    volumes:
      - .:/app                              # Código bind-mounted do host
      - dev_node_modules:/app/node_modules  # Binários Linux (isolado do macOS)
      - dev_next:/app/.next                 # Cache Turbopack (isolado do host)
      - ./data:/app/data                    # Banco SQLite
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - WATCHPACK_POLLING=true              # File watching em Docker macOS
    restart: unless-stopped

volumes:
  dev_node_modules:   # node_modules compilado para Linux (não macOS ARM)
  dev_next:           # Cache do Next.js/Turbopack
