name: CD (EC2)

on:
  # Só roda deploy quando o CI passar com sucesso
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Evita deploys concorrentes se fizer pushes em sequência
concurrency:
  group: deutschtutor-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Só executa se o CI concluiu com sucesso (ou se foi dispatch manual)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /home/ubuntu/deutschtutor-pro

            # Atualiza código
            git fetch origin main
            git reset --hard origin/main

            # Rebuild + restart
            docker compose up -d --build --force-recreate --remove-orphans

            # Limpeza de imagens antigas
            docker image prune -f
