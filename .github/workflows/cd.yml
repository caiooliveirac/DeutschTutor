name: CD (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deutschtutor-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /home/ubuntu/deutschtutor-pro

            # Update code
            git fetch origin main
            git reset --hard origin/main

            # Login to GHCR to pull pre-built image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the pre-built image
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            docker pull ghcr.io/${REPO}:latest

            # Tag it so docker compose uses the pre-built image
            docker tag ghcr.io/${REPO}:latest deutschtutor-pro-deutschtutor:latest

            # Start/restart with pre-built image (no build)
            docker compose up -d --no-build --force-recreate --remove-orphans

            # Wait for postgres to be healthy
            echo "Waiting for PostgreSQL..."
            for i in $(seq 1 30); do
              docker compose exec -T postgres pg_isready -U deutschtutor && break || sleep 2
            done

            # Ensure tables exist (init.sql only runs on first start with empty volume)
            docker compose exec -T postgres psql -U deutschtutor -d deutschtutor -f /docker-entrypoint-initdb.d/init.sql || true

            # Cleanup
            docker image prune -f
